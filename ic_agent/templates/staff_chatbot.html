<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>IC Chat - Student Progress</title>
    <link rel="stylesheet" href="{{ url_for('static', filename='style.css') }}">
    <style>
        @import url('https://fonts.googleapis.com/css2?family=Red+Hat+Display:wght@400;500;600;700;800&display=swap');

        :root {
            --ic-green-900: #0b3b2e;
            --ic-green-800: #115940;
            --ic-green-700: #1f7a55;
            --ic-green-600: #2f9a69;
            --ic-gold-600: #d9a108;
            --ic-gold-500: #f2c94c;
            --ic-gold-100: #fff3cd;
            --ic-green-50: #eef9f3;
            --ic-white: #ffffff;
            --ic-ink: #1f2023;
            --ic-muted: #6a6b70;
            --ic-line: #cde8d9;
        }

        body {
            font-family: 'Red Hat Display', sans-serif;
            background:
                radial-gradient(circle at 10% -20%, rgba(31, 122, 85, 0.22), rgba(31, 122, 85, 0) 35%),
                radial-gradient(circle at 95% 10%, rgba(242, 201, 76, 0.18), rgba(242, 201, 76, 0) 42%),
                linear-gradient(155deg, #fcfffd 0%, #f4fbf7 48%, #fffef8 100%);
            min-height: 100vh;
            padding: 12px;
        }

        .container {
            border: 1px solid rgba(17, 89, 64, 0.22);
            box-shadow: 0 24px 58px rgba(11, 59, 46, 0.14);
            display: flex;
            flex-direction: column;
            min-height: calc(100dvh - 24px);
        }

        .navbar {
            background: linear-gradient(110deg, var(--ic-green-900) 0%, var(--ic-green-800) 58%, var(--ic-green-700) 100%);
            padding: 16px 28px;
            position: relative;
            overflow: hidden;
        }

        .navbar::after {
            content: "";
            position: absolute;
            inset: 0;
            background: repeating-linear-gradient(
                -45deg,
                rgba(255, 255, 255, 0.05),
                rgba(255, 255, 255, 0.05) 12px,
                rgba(242, 201, 76, 0.12) 12px,
                rgba(242, 201, 76, 0.12) 24px
            );
            pointer-events: none;
        }

        .nav-brand,
        .nav-menu {
            position: relative;
            z-index: 1;
        }

        .nav-brand {
            letter-spacing: 0.3px;
            font-size: 1.2em;
            font-weight: 800;
        }

        .nav-menu span {
            padding: 6px 12px;
            border-radius: 999px;
            border: 1px solid rgba(255, 255, 255, 0.35);
            background: rgba(255, 255, 255, 0.12);
            font-weight: 600;
            font-size: 0.92em;
        }

        .chatbot-container {
            display: flex;
            flex-direction: column;
            flex: 1;
            min-height: 0;
            background:
                radial-gradient(circle at 90% 0%, rgba(255, 243, 205, 0.65) 0%, rgba(255, 243, 205, 0) 35%),
                linear-gradient(180deg, #fcfffd 0%, #f7fcf9 100%);
        }

        .chat-messages {
            flex: 1;
            overflow-y: auto;
            padding: 24px;
            display: flex;
            flex-direction: column;
            gap: 14px;
        }

        .message {
            display: flex;
            gap: 10px;
            animation: slideIn 0.28s ease-out;
        }

        @keyframes slideIn {
            from {
                opacity: 0;
                transform: translateY(12px) scale(0.98);
            }
            to {
                opacity: 1;
                transform: translateY(0) scale(1);
            }
        }

        .message.user {
            justify-content: flex-end;
        }

        .message.bot {
            justify-content: flex-start;
        }

        .message-content {
            max-width: 70%;
            padding: 12px 15px;
            border-radius: 14px;
            word-wrap: break-word;
            overflow-wrap: anywhere;
            line-height: 1.45;
            box-shadow: 0 8px 22px rgba(17, 17, 17, 0.07);
        }

        .user .message-content {
            background: linear-gradient(140deg, var(--ic-green-800) 0%, var(--ic-green-600) 100%);
            color: var(--ic-white);
            border-bottom-right-radius: 6px;
        }

        .bot .message-content {
            background: var(--ic-white);
            color: var(--ic-ink);
            border: 1px solid #dcefe4;
            border-bottom-left-radius: 6px;
        }

        .chat-input-area {
            padding: 20px;
            background: rgba(255, 255, 255, 0.94);
            border-top: 1px solid #d8eede;
            backdrop-filter: blur(4px);
            position: sticky;
            bottom: 0;
            z-index: 5;
        }

        .search-form {
            display: flex;
            gap: 10px;
            align-items: center;
        }

        .search-form input {
            flex: 1;
            min-width: 0;
            padding: 12px 16px;
            border: 1px solid var(--ic-line);
            border-radius: 24px;
            font-size: 16px;
            outline: none;
            transition: border-color 0.2s, box-shadow 0.2s;
            background: #fffdfd;
        }

        .search-form input:focus {
            border-color: var(--ic-green-700);
            box-shadow: 0 0 0 4px rgba(31, 122, 85, 0.16);
        }

        .search-form button {
            width: 50px;
            height: 50px;
            background: linear-gradient(135deg, var(--ic-green-800) 0%, var(--ic-green-600) 100%);
            color: var(--ic-white);
            border: none;
            border-radius: 50%;
            cursor: pointer;
            font-weight: 600;
            transition: transform 0.2s, filter 0.2s;
            display: inline-flex;
            align-items: center;
            justify-content: center;
        }

        .search-form button:hover {
            transform: translateY(-1px);
            filter: brightness(1.05);
        }

        .search-form button svg {
            width: 20px;
            height: 20px;
        }

        .student-card {
            background: var(--ic-white);
            border-radius: 12px;
            padding: 16px;
            margin: 10px 0;
            border: 1px solid #dceddf;
            border-left: 4px solid var(--ic-green-700);
            box-shadow: 0 8px 20px rgba(17, 89, 64, 0.09);
            overflow: hidden;
        }

        .student-header {
            display: flex;
            justify-content: space-between;
            align-items: center;
            margin-bottom: 12px;
        }

        .student-name {
            font-size: 18px;
            font-weight: 700;
            color: #2c1212;
        }

        .student-id {
            font-size: 12px;
            color: var(--ic-muted);
        }

        .student-stats {
            display: grid;
            grid-template-columns: 1fr 1fr 1fr;
            gap: 12px;
            margin-bottom: 12px;
            font-size: 14px;
        }

        .stat {
            display: flex;
            flex-direction: column;
        }

        .stat-label {
            color: var(--ic-muted);
            font-size: 12px;
        }

        .stat-value {
            font-weight: 600;
            color: #301111;
            font-size: 16px;
        }

        .student-actions {
            display: flex;
            gap: 8px;
            margin-top: 12px;
        }

        .btn-view {
            flex: 1;
            padding: 8px 12px;
            background: var(--ic-gold-100);
            color: var(--ic-green-900);
            border: 1px solid #efd67e;
            border-radius: 6px;
            cursor: pointer;
            font-size: 14px;
            text-decoration: none;
            text-align: center;
            font-weight: 700;
            transition: background 0.2s, transform 0.2s;
        }

        .btn-view:hover {
            background: #ffe9a6;
            transform: translateY(-1px);
        }

        .analysis-preview {
            background: var(--ic-green-50);
            padding: 12px;
            border-radius: 6px;
            margin-top: 12px;
            font-size: 13px;
            line-height: 1.5;
            border: 1px solid #d6ebde;
        }

        .no-results {
            text-align: center;
            color: var(--ic-muted);
            padding: 20px;
        }

        .loading {
            text-align: center;
            color: var(--ic-muted);
            padding: 10px;
        }

        .welcome-message {
            text-align: center;
            color: var(--ic-muted);
            padding: 20px;
        }

        @media (max-width: 768px) {
            body {
                padding: 0;
            }

            .container {
                min-height: 100dvh;
                border-radius: 0;
                border-left: 0;
                border-right: 0;
            }

            .navbar {
                padding: 14px 16px;
                gap: 10px;
                flex-wrap: wrap;
            }

            .nav-brand {
                font-size: 1.04em;
            }

            .chat-messages {
                padding: 14px;
            }

            .message-content {
                max-width: 92%;
                padding: 11px 12px;
            }

            .search-form {
                flex-direction: row;
                align-items: center;
                gap: 8px;
            }

            .search-form input,
            .search-form button {
                min-height: 46px;
            }

            .search-form button {
                width: 46px;
                height: 46px;
                flex: 0 0 46px;
            }

            .student-stats {
                grid-template-columns: 1fr;
                gap: 10px;
            }

            .student-header {
                align-items: flex-start;
                gap: 8px;
            }
        }

        @media (max-width: 480px) {
            .nav-menu {
                width: 100%;
            }

            .nav-menu span {
                display: inline-block;
                width: 100%;
                text-align: center;
            }

            .chat-messages {
                padding: 12px;
                gap: 10px;
            }

            .chat-input-area {
                padding: 12px;
            }

            .search-form {
                gap: 8px;
            }

            .search-form input {
                padding: 10px 14px;
                font-size: 15px;
            }

            .search-form button {
                width: 44px;
                height: 44px;
                min-height: 44px;
                flex: 0 0 44px;
            }

            .message-content {
                max-width: 96%;
                font-size: 0.95rem;
            }

            .student-card {
                padding: 12px;
            }

            .student-name {
                font-size: 16px;
            }

            .student-actions {
                flex-direction: column;
            }

            .btn-view {
                width: 100%;
            }
        }
    </style>
</head>
<body>
    <div class="container">
        <nav class="navbar">
            <div class="nav-brand">IC Chat - Student Search</div>
            <div class="nav-menu">
                <span>IC Staff</span>
            </div>
        </nav>

        <div class="chatbot-container">
            <div class="chat-messages" id="chatMessages">
                <div class="message bot">
                    <div class="message-content">
                        <strong>Welcome to IC Chat! 👋</strong><br>
                        Type a student name, then tap search to see their progress, submissions, and analysis scores.
                    </div>
                </div>
            </div>

            <div class="chat-input-area">
                <div class="search-form">
                    <input type="text" id="searchInput" placeholder="Search student by name..." autocomplete="off">
                    <button id="searchBtn" aria-label="Search student" title="Search">
                        <svg viewBox="0 0 24 24" fill="none" xmlns="http://www.w3.org/2000/svg" aria-hidden="true">
                            <circle cx="11" cy="11" r="7" stroke="currentColor" stroke-width="2"></circle>
                            <path d="M16.5 16.5L21 21" stroke="currentColor" stroke-width="2" stroke-linecap="round"></path>
                        </svg>
                    </button>
                </div>
            </div>
        </div>
    </div>

    <script>
        const searchInput = document.getElementById('searchInput');
        const searchBtn = document.getElementById('searchBtn');
        const chatMessages = document.getElementById('chatMessages');

        function addMessage(content, isUser = false) {
            const messageEl = document.createElement('div');
            messageEl.className = `message ${isUser ? 'user' : 'bot'}`;
            messageEl.innerHTML = `<div class="message-content">${content}</div>`;
            chatMessages.appendChild(messageEl);
            chatMessages.scrollTop = chatMessages.scrollHeight;
        }

        async function searchStudents(query) {
            if (!query.trim() || query.length < 2) {
                addMessage("Please enter at least 2 characters to search.");
                return;
            }

            // Add user message
            addMessage(`Search: ${query}`, true);

            // Show loading state
            addMessage("🔍 Searching...");
            const loadingMsg = chatMessages.lastChild;

            try {
                const response = await fetch(`/api/search_student?q=${encodeURIComponent(query)}`);
                const data = await response.json();

                // Remove loading message
                loadingMsg.remove();

                if (!data.success) {
                    addMessage("❌ Search failed. Please try again.");
                    return;
                }

                if (data.results.length === 0) {
                    addMessage("No students found. Try a different name.");
                    return;
                }

                // Add each student result as a message
                data.results.forEach(student => {
                    const statusColor = student.pending_submissions > 0 ? '🟠' : '🟢';
                    const analysis = student.latest_analysis || {};
                    const score = (analysis.score_percent ?? '-');
                    const recommendation = analysis.recommendation || '-';
                    const lastSubmission = student.last_submission ? new Date(student.last_submission).toLocaleDateString() : '-';

                    let content = `
                        <div class="student-card">
                            <div class="student-header">
                                <div>
                                    <div class="student-name">${student.name}</div>
                                    <div class="student-id">ID: ${student.student_identifier || '-'}</div>
                                </div>
                                <span>${statusColor}</span>
                            </div>
                            <div class="student-stats">
                                <div class="stat">
                                    <div class="stat-label">Total Submissions</div>
                                    <div class="stat-value">${student.total_submissions || 0}</div>
                                </div>
                                <div class="stat">
                                    <div class="stat-label">Pending</div>
                                    <div class="stat-value">${student.pending_submissions || 0}</div>
                                </div>
                                <div class="stat">
                                    <div class="stat-label">Score</div>
                                    <div class="stat-value">${score}${score !== '-' ? '%' : ''}</div>
                                </div>
                            </div>
                        <div class="student-actions">
                            <button class="btn-view analyze-btn" data-id="${student.id}">Analyze</button>
                        </div>
                    `;

                    if (analysis.matched_skills && analysis.matched_skills.length > 0) {
                        content += `
                            <div class="analysis-preview">
                                <strong>✅ Matched Skills (${analysis.matched_skills.length}):</strong><br>
                                ${analysis.matched_skills.slice(0, 3).join(', ')}${analysis.matched_skills.length > 3 ? '...' : ''}
                            </div>
                        `;
                    }

                    content += `</div>`;

                    addMessage(content, false);
                });

            } catch (error) {
                console.error('Search error:', error);
                loadingMsg.remove();
                addMessage("❌ Connection error. Please try again.");
            }
        }

        searchBtn.addEventListener('click', () => {
            const query = searchInput.value;
            if (query.trim()) {
                searchStudents(query);
                searchInput.value = '';
            }
        });

        searchInput.addEventListener('keypress', (e) => {
            if (e.key === 'Enter') {
                const query = searchInput.value;
                if (query.trim()) {
                    searchStudents(query);
                    searchInput.value = '';
                }
            }
        });

        // Delegate analyze button clicks
        document.addEventListener('click', async (e) => {
            if (e.target && e.target.classList.contains('analyze-btn')) {
                const studentId = e.target.getAttribute('data-id');
                addMessage('🔬 Running analysis for student...', true);
                try {
                    const resp = await fetch('/api/analyze_student', {
                        method: 'POST',
                        headers: { 'Content-Type': 'application/json' },
                        body: JSON.stringify({ student_id: studentId })
                    });
                    const j = await resp.json();
                    if (!j.success) {
                        addMessage('❌ Analysis failed: ' + (j.message || 'Unknown'));
                        return;
                    }
                    const analysis = j.analysis || {};
                    const score = (analysis.score_percent ?? '-');
                    const recommendation = (analysis.recommendation || '-').toUpperCase();
                    const risk = (analysis.authenticity_risk || '-').toUpperCase();
                    const matchedItems = (analysis.matched_items || analysis.matched_skills || []);
                    const mismatchItems = (analysis.mismatch_items || analysis.missing_skills || []);
                    const suspiciousSignals = (analysis.suspicious_signals || []);
                    const errorTypes = (analysis.error_types || []);
                    const matchedCount = matchedItems.length;
                    const mismatchCount = mismatchItems.length;
                    const suspiciousCount = suspiciousSignals.length;
                    const errorTypeCount = errorTypes.length;
                    const summary = analysis.summary || 'Analysis completed with no additional summary from model.';
                    const feedback = analysis.feedback || 'No additional feedback provided.';

                    const missingHtml = mismatchCount > 0
                        ? mismatchItems.slice(0, 5).map(item => `- ${item}`).join('<br>')
                        : 'None detected.';
                    const suspiciousHtml = suspiciousCount > 0
                        ? suspiciousSignals.slice(0, 5).map(item => `- ${item}`).join('<br>')
                        : 'None detected.';
                    const errorTypesHtml = errorTypeCount > 0
                        ? errorTypes.map(item => `- ${String(item).replace(/_/g, ' ')}`).join('<br>')
                        : 'None detected.';
                    const fraudBanner = suspiciousCount > 0 || risk === 'HIGH'
                        ? '<br><strong style="color:#b91c1c;">Potential Fraud Alert:</strong> Suspicious indicators found.'
                        : '<br><strong style="color:#15803d;">Fraud Check:</strong> No suspicious indicators detected.';

                    addMessage(
                        `<div class="analysis-preview">` +
                        `<strong>Analysis Result</strong><br>` +
                        `Score: ${score}%<br>` +
                        `Recommendation: ${recommendation}<br>` +
                        `Risk: ${risk}<br>` +
                        `Matched: ${matchedCount}, Missing/Mismatch: ${mismatchCount}, Suspicious: ${suspiciousCount}, Error Types: ${errorTypeCount}` +
                        `${fraudBanner}<br><br>` +
                        `<strong>What is Missing:</strong><br>${missingHtml}<br><br>` +
                        `<strong>Error Types:</strong><br>${errorTypesHtml}<br><br>` +
                        `<strong>Fraud/Suspicious Signals:</strong><br>${suspiciousHtml}<br><br>` +
                        `<strong>Summary:</strong><br>${summary}<br><br>` +
                        `<strong>Feedback:</strong><br>${feedback}` +
                        `</div>`
                    );
                } catch (err) {
                    console.error(err);
                    addMessage('❌ Analysis request failed.');
                }
            }
        });

        // Focus input on load
        window.addEventListener('load', () => {
            searchInput.focus();
        });
    </script>
</body>
</html>
